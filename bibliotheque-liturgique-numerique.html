<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorateur - Paroisse de Changé</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f5f7fa;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .folder, .file {
      background: white;
      border-radius: 16px;
      padding: 15px 5px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .folder:hover, .file:hover {
      background: #eef2ff;
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    h1 {
      font-size: 1.8rem;
      margin: 0;
      color: #1e3a5f;
    }
    .btn-secondary {
      background-color: #6c757d;
      border: none;
      border-radius: 30px;
      padding: 6px 16px;
      text-decoration: none;
      color: white;
    }
    .btn-secondary:hover {
      background-color: #5a6268;
      color: white;
    }
    .logo {
      height: 80px;
      margin-bottom: 10px;
    }
    @media (max-width: 768px) {
      .col-md-2 { width: 45%; margin: 0 auto; }
      .folder, .file { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <!-- En-tête avec logo et bouton Accueil -->
  <div style="position: relative; margin-bottom: 2rem;">
    <div style="position: absolute; right: 0; top: 0;">
      <a href="index.html" class="btn btn-secondary">🏠 Accueil</a>
    </div>
    <div style="text-align: center;">
      <div>
        <!-- Logo de la Paroisse de Changé (le fichier existe dans le dossier image/) -->
        <img src="image/Paroisse%20change.jpg" alt="Logo Paroisse Saint Pierre de Changé" class="logo">
      </div>
      <h1>Paroisse de Changé</h1>
    </div>
  </div>

  <!-- Grille des dossiers et fichiers -->
  <div class="row g-3">
    <!-- Dossiers -->
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="folder" onclick="navigateTo('documents')">📁<br>documents</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="folder" onclick="navigateTo('partitions')">📁<br>partitions</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="folder" onclick="navigateTo('photos')">📁<br>photos</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="folder" onclick="navigateTo('bulletins')">📁<br>bulletins</div>
    </div>
    <!-- Fichiers -->
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="file" onclick="openFile('missel.pdf')">📄<br>missel.pdf</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="file" onclick="openFile('lectures.pdf')">📄<br>lectures.pdf</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="file" onclick="openFile('chant.mp3')">📄<br>chant.mp3</div>
    </div>
    <div class="col-md-2 col-6 text-center mb-3">
      <div class="file" onclick="openFile('guide.pdf')">📄<br>guide.pdf</div>
    </div>
  </div>

  <p class="text-muted text-center mt-4">Cliquez sur un dossier pour naviguer, sur un fichier pour l'ouvrir.</p>
</div>

<script>
  function navigateTo(path) {
    // Redirige vers la même page avec un paramètre (à adapter selon votre back-end)
    window.location.href = `?path=${encodeURIComponent(path)}`;
  }

  function openFile(filename) {
    // Ouvre le fichier dans un nouvel onglet (chemin à adapter)
    window.open(`/partitions/${filename}`, '_blank');
  }

  console.log("Explorateur Paroisse de Changé - avec logo personnalisé");
</script>
</body>
</html>
