<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive API - Affichage de Fichiers</title>
    <!-- Style CSS pour l'affichage des fichiers -->
    <style>
        .file-list { list-style: none; padding: 0; }
        .file-list li { margin: 5px 0; padding: 8px; background-color: #f9f9f9; border-radius: 4px; }
        .file-list a { text-decoration: none; color: #333; display: block; }
        .file-list a:hover { background-color: #e9e9e9; }
    </style>
</head>
<body>

<button id="auth-button" style="display: none;">Se connecter avec Google</button>
<h2>Fichiers dans mon Drive</h2>
<ul id="file-list" class="file-list"></ul>

<!-- Chargement de l'API Google -->
<script src="https://apis.google.com/js/api.js"></script>
<script>
    // Configuration (à remplacer par vos identifiants)
    const API_KEY = 'VOTRE_CLE_API_ICI';  // À remplacer
    const CLIENT_ID = 'VOTRE_CLIENT_ID_ICI.apps.googleusercontent.com'; // À remplacer
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly'; // Droits de lecture seule
    const DISCOVERY_DOCS = ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'];

    let tokenClient;

    function gapiLoaded() {
        gapi.load('client', initializeGapiClient);
    }

    async function initializeGapiClient() {
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: DISCOVERY_DOCS,
        });
        // Initialise l'OAuth 2.0 client après le chargement de gapi.client
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: '', // Défini plus tard
        });
    }

    function listFiles() {
        gapi.client.drive.files.list({
            'pageSize': 10,
            'fields': "nextPageToken, files(id, name, mimeType, webViewLink, webContentLink)",
            'q': "'VOTRE_ID_DOSSIER' in parents" // Filtrer par dossier spécifique
        }).then(function(response) {
            const files = response.result.files;
            const fileListElement = document.getElementById('file-list');
            fileListElement.innerHTML = '';
            if (files && files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = file.webViewLink; // Lien vers la vue du fichier
                    link.target = '_blank'; // Ouvre dans un nouvel onglet
                    let fileName = file.name;
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        fileName = '📁 ' + fileName; // Ajoute une icône pour les dossiers
                    } else {
                        fileName = '📄 ' + fileName; // Ajoute une icône pour les fichiers
                    }
                    link.textContent = fileName;
                    li.appendChild(link);
                    fileListElement.appendChild(li);
                }
            } else {
                fileListElement.innerHTML = '<li>Aucun fichier trouvé.</li>';
            }
        });
    }
</script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gapiLoaded()"></script>
</body>
</html>
